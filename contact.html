<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Nalini Kant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: pink !important; }
        .chatbot {
            background: white;
            border-radius: 15px;
            padding: 25px;
            max-width: 650px;
            margin: 40px auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .blink { animation: blink 1.4s infinite; }
        @keyframes blink { 50% { opacity: 0.45; } }
        #chatWindow {
            min-height: 280px;
            max-height: 380px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Nalini Kant</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 text-center">
    <h1>Contact Me</h1>
    <a href="resumenk.pdf" download class="btn btn-success btn-lg mb-5">Download Resume (PDF)</a>

    <div class="chatbot">
        <h5 class="blink text-center mb-3">Ask me anything about Nalini Kant <i class="fas fa-robot ms-2"></i></h5>
        <div id="chatWindow"></div>
        <div class="input-group">
            <input type="text" id="userInput" class="form-control" placeholder="Type your question here..." autocomplete="off">
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<footer class="mt-5">
    <div class="container text-center">
        <hr>
        <p>All Rights Reserved © Nalini Kant</p>
        <div class="footer-yellow">Design and Developed by Nalini Kant</div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;

    const chat = document.getElementById('chatWindow');
    chat.innerHTML += `<p class="mb-2"><strong>You:</strong> ${msg}</p>`;

    let reply = "Hi! I'm Nalini Kant's assistant. How can I help you?";

    const lower = msg.toLowerCase();

    // Name & basic info
    if (lower.includes("name") || lower.includes("who") || lower.includes("introduce")) {
        reply = "My name is **Nalini Kant**. I am an Electronics & Communication Engineer, passionate about coding and VLSI design.";
    }

    // Skills
    else if (lower.includes("skill") || lower.includes("skills") || lower.includes("know") || lower.includes("programming") || lower.includes("technical")) {
        reply = "**My Technical Skills:**\n\n" +
                "• Programming: C, C++, HTML, CSS, JavaScript, Bootstrap\n" +
                "• Database & Tools: MySQL, Git, GitHub\n" +
                "• Software: VS Code, MS Excel, MS Word, MS PowerPoint\n" +
                "• Core Subjects: Digital Circuits, Analog Circuits, EDC, Network Theory, Signals & Systems, Communication Systems, Electromagnetic Theory, Control Systems, Digital CMOS VLSI Design";
    }

    // Education
    else if (lower.includes("education") || lower.includes("study") || lower.includes("degree") || lower.includes("b.tech") || lower.includes("12th") || lower.includes("10th") || lower.includes("university")) {
        reply = "**Education Background:**\n\n" +
                "• **B.Tech – Electronics & Communication Engineering**\n" +
                "  Bihar Engineering University, Patna (Dec 2020 – Aug 2024)\n\n" +
                "• **12th (CBSE)**\n" +
                "  Satyam International School, Patna (2018–2020)\n" +
                "  Subjects: Mathematics, Physics, Chemistry, English, Painting\n\n" +
                "• **10th (CBSE)**\n" +
                "  R.P.S Public School, Patna (2017–2018)\n" +
                "  Subjects: Mathematics, Science, Social Science, English, Sanskrit";
    }

    // Certifications
    else if (lower.includes("certif") || lower.includes("nptel") || lower.includes("great learning")) {
        reply = "**Certifications:**\n" +
                "• Sensor Technologies: Physics Fabrication and Circuits – NPTEL\n" +
                "• Developing Soft Skills and Personality – NPTEL\n" +
                "• C Programming Language – Great Learning\n" +
                "• C++ – Great Learning";
    }

    // Projects
    else if (lower.includes("project") || lower.includes("projects") || lower.includes("voting") || lower.includes("radar") || lower.includes("online voting") || lower.includes("ultrasonic")) {
        reply = "**My Projects:**\n\n" +
                "1. **Online Voting System** (Dynamic Web Application)\n" +
                "   - Front-end: HTML, CSS, Bootstrap\n" +
                "   - Back-end: PHP + MySQL\n" +
                "   - Features: Form validation, AJAX, secure voting\n\n" +
                "2. **Radar Using Ultrasonic Sensor**\n" +
                "   - Hardware: Arduino Uno, HC-SR04 Ultrasonic Sensor, Servo Motor\n" +
                "   - Software: Arduino IDE + Processing IDE (real-time angle & distance visualization)";
    }

    // Achievements
    else if (lower.includes("achieve") || lower.includes("award") || lower.includes("club") || lower.includes("meritorious")) {
        reply = "**Achievements & Awards:**\n" +
                "• Meritorious Student Encouragement Award – for excellent performance in semester examinations\n" +
                "• Secretary of College Coding Club";
    }

    // Contact & Links
    else if (lower.includes("contact") || lower.includes("email") || lower.includes("reach") || lower.includes("linkedin") || lower.includes("github")) {
        reply = "You can contact me at:\n\n" +
                "Email: nalinikantk@gmail.com\n" +
                "LinkedIn: https://www.linkedin.com/in/nalinikant1\n" +
                "GitHub: https://github.com/NaliniKant1\n\n" +
                "Feel free to message me!";
    }

    // Fallback
    else {
        reply = "I can tell you about:\n" +
                "• My name and background\n" +
                "• Skills & technologies\n" +
                "• Education details\n" +
                "• Projects I've worked on\n" +
                "• Certifications\n" +
                "• Achievements\n" +
                "• How to contact me\n\n" +
                "What would you like to know?";
    }

    chat.innerHTML += `<p class="mb-2 text-primary"><strong>Bot:</strong> ${reply}</p>`;
    chat.scrollTop = chat.scrollHeight;
    input.value = '';
}

// Allow Enter key to send message
document.getElementById('userInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
});
</script>
</body>
</html>
