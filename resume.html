<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="script.js"></script>
<script>
// Same chatbot script as contact.html
function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;

    const chat = document.getElementById('chatWindow');
    chat.innerHTML += `<p class="mb-1"><strong>You:</strong> ${msg}</p>`;

    let reply = "Hello! I'm Nalini Kant's assistant. How can I help you today?";
    const lower = msg.toLowerCase();

    if (lower.includes("name") || lower.includes("who are you")) reply = "My name is Nalini Kant.";
    if (lower.includes("skill") || lower.includes("skills")) reply = "I know C, C++, HTML, CSS, JavaScript, Bootstrap, MySQL, Git/GitHub and VLSI design subjects.";
    if (lower.includes("education") || lower.includes("study")) reply = "I completed B.Tech in Electronics & Communication from Bihar Engineering University (2020-2024).";
    if (lower.includes("project") || lower.includes("projects")) reply = "I built an Online Voting System (PHP + MySQL) and a Radar using Ultrasonic Sensor (Arduino).";
    if (lower.includes("contact") || lower.includes("email")) reply = "You can reach me at nalinikantk@gmail.com";

    chat.innerHTML += `<p class="mb-1 text-primary"><strong>Bot:</strong> ${reply}</p>`;
    chat.scrollTop = chat.scrollHeight;
    input.value = '';
}
</script>
